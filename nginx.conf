server {
    listen 80;
    server_name localhost;

    # ---------------------------------------------------------
    # 1. CENTRAL HUB (Home menu)
    # ---------------------------------------------------------
    # If someone enters the bare IP (e.g. http://192.168.1.45/),
    # Nginx serves the index.html from the /usr/share/nginx/html folder
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # ---------------------------------------------------------
    # 2. PROJECT: IT INVENTORY (Frontend)
    # ---------------------------------------------------------
    # If the URL starts with /inventario/ (e.g. http://192.168.1.45/inventario/)
    # redirect traffic to the internal Nginx container of that project.
    location /inventario/ {
        # 'inventario-frontend' is the container_name we set in your docker-compose
        proxy_pass http://inventario-frontend:80/;
        
        # These headers ensure that the real IP of the connector is not lost
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------------------------------------------------------
    # 3. PROJECT: IT INVENTORY (Backend API)
    # ---------------------------------------------------------
    # Catches JavaScript requests to the API and sends them directly to Java.
    # Assuming your Spring Boot runs on port 8080 internally.
    location /api/v1/ {
        # 'inventario-backend' is the container_name of your Spring Boot
        proxy_pass http://inventario-backend:8080/api/v1/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    
}