services:
  nginx-proxy:
    image: nginx:alpine
    container_name: hub-proxy
    ports:
      - "80:80"  # THIS is the only container that exposes port 80 to the outside world
    volumes:
      - ./html:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - inventario-net
      - global-router
    restart: unless-stopped

# Here comes the magic: we tell Docker that this network already exists externally
networks:
  global-router:
    external: true