services:
  nginx-proxy:
    image: nginx:alpine
    container_name: hub-proxy
    ports:
      - "80:80"  # ESTE es el único contenedor que expone el puerto 80 al mundo real
    volumes:
      - ./html:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - global-router
    restart: unless-stopped

# Aquí viene la magia: le decimos a Docker que esta red ya existe por fuera
networks:
  global-router:
    external: true