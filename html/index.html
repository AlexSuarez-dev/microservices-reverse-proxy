<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Gateway Hub</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #121212; 
            color: #ffffff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { 
            background-color: #1e1e1e; 
            padding: 3rem; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            text-align: center;
            border: 1px solid #333;
        }
        h1 { margin-top: 0; color: #0db7ed; }
        .links { display: flex; flex-direction: column; gap: 1rem; margin-top: 2rem; }
        a { 
            background-color: #2a2a2a; 
            color: #ffffff; 
            text-decoration: none; 
            padding: 1rem 2rem; 
            border-radius: 6px; 
            font-weight: bold;
            transition: all 0.3s ease;
            border: 1px solid #444;
        }
        a:hover { 
            background-color: #0db7ed; 
            color: #000000; 
            border-color: #0db7ed;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 Microservices Gateway</h1>
        <p>Select an environment to proceed:</p>
        
        <div class="links">
            <!-- Fíjate que las rutas coinciden exactamente con lo que pusiste en nginx.conf -->
            <a href="/inventario/">📦 IT Inventory System</a>
            <a href="/quemenges/">🍽️ QueMenges Platform</a>
        </div>
    </div>
</body>
</html>
